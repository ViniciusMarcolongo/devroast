services:
  postgres:
    image: postgres:17-alpine
    container_name: devroast-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: devroast
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "6543:5432"
    volumes:
      - devroast-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d devroast"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  devroast-postgres-data:
